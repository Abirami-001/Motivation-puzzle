<!-- index.html -->

<!DOCTYPE html>
<html>
<head>
    <title>Daily Motivation Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🌈 Daily Motivation Hub</h1>
    <p>Tell us how you feel today 💬</p>

    <!-- Questions Form -->
    <form id="moodForm">

        <label>Your Name:</label>
        <input type="text" id="name" required>
<br>

        <label>Your Mood:</label>
        <select id="mood">
            <option value="happy">😊 Happy</option>
            <option value="sad">😔 Sad</option>
            <option value="stressed">😫 Stressed</option>
            <option value="tired">😴 Tired</option>
        </select>
<br>

        <label>How was your day?</label>
        <select id="day">
            <option value="good">Good</option>
            <option value="average">Average</option>
            <option value="bad">Bad</option>
        </select>
<br>

        <label>What’s bothering you?</label>
        <textarea id="problem"></textarea>
<br>

        <label>Energy Level (1–5):</label>
        <input type="number" id="energy" min="1" max="5">
<br>

        <button type="button" onclick="showMotivation()">
            Get Motivation 🚀
        </button>

    </form>

    <!-- Hidden Result Section -->
    <div id="afterSubmit" style="display: none;">

        <hr>

        <h2>💡 Your Motivation</h2>
        <div id="quoteBox"></div>

        <h2>📖 Daily Story</h2>
        <div id="storyBox"></div>

        <hr>

        <h2>🧩 Daily Motivation Puzzle</h2>
        <p>Click letters to form the motivational word</p>

        <!-- Display Box -->
        <div id="displayBox"></div>

        <!-- Puzzle Buttons -->
        <div class="puzzle-container">

            <button type="button" onclick="addLetter('P')">P</button>
	    <button type="button" onclick="addLetter('N')">N</button>
	    <button type="button" onclick="addLetter('I')">I</button>
	    <button type="button" onclick="addLetter('S')">S</button>
	    <button type="button" onclick="addLetter('I')">I</button>
            <button type="button" onclick="addLetter('E')">E</button>
            <button type="button" onclick="addLetter('D')">D</button>
            <button type="button" onclick="addLetter('R')">R</button>

        </div>

        <!-- Submit + Clear Buttons -->
        <div class="action-buttons">
            <button type="button" class="submit-btn" onclick="submitPuzzle()">
                Submit
            </button>

            <button type="button" class="clear-btn" onclick="clearWord()">
                Clear
            </button>
        </div>

        <div id="puzzleResult"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
